<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Намаз — Баку</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc80;
      --dark: #0d1117;
      --dark2: #161b22;
      --dark3: #1c2330;
      --text: #e6dcc8;
      --muted: #8b8070;
      --active: #c9a84c;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M30 0 L60 30 L30 60 L0 30Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.8s ease both;
    }

    .arabic-title {
      font-family: 'Amiri', serif;
      font-size: 2.4rem;
      color: var(--gold);
      line-height: 1.2;
      margin-bottom: 4px;
      text-shadow: 0 0 40px rgba(201,168,76,0.3);
    }

    .city-name {
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    /* Date & clock */
    .date-block {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .date-gregorian {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 600;
    }

    .date-hijri {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .clock {
      font-family: 'Amiri', serif;
      font-size: 1.8rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    /* Next prayer banner */
    .next-prayer {
      background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.05));
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .next-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .next-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .next-countdown {
      font-family: 'Amiri', serif;
      font-size: 1.6rem;
      color: var(--gold-light);
    }

    /* Prayer cards */
    .prayers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .prayer-card {
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 16px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
      animation: fadeUp 0.6s ease both;
      cursor: default;
    }

    .prayer-card:hover {
      border-color: rgba(201,168,76,0.3);
      background: var(--dark3);
      transform: translateX(4px);
    }

    .prayer-card.active {
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 20px rgba(201,168,76,0.1);
    }

    .prayer-card.passed {
      opacity: 0.45;
    }

    .prayer-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .prayer-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(201,168,76,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .prayer-card.active .prayer-icon {
      background: rgba(201,168,76,0.25);
    }

    .prayer-name-ru {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .prayer-name-ar {
      font-family: 'Amiri', serif;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .prayer-time {
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: var(--gold);
    }

    .prayer-card.active .prayer-time {
      color: var(--gold-light);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      animation: pulse 1.5s infinite;
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* Error */
    .error {
      text-align: center;
      padding: 40px 20px;
      color: #e07070;
      font-size: 0.9rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="arabic-title">أوقات الصلاة</div>
    <div class="city-name">Баку · Азербайджан</div>
  </div>

  <div class="date-block">
    <div>
      <div class="date-gregorian" id="date-gregorian">—</div>
      <div class="date-hijri" id="date-hijri">—</div>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <div class="next-prayer" id="next-block" style="display:none">
    <div>
      <div class="next-label">Следующий намаз</div>
      <div class="next-name" id="next-name">—</div>
    </div>
    <div class="next-countdown" id="next-countdown">--:--</div>
  </div>

  <div id="prayers-container">
    <div class="loading">
      <div class="spinner"></div>
      Загрузка времён намаза...
    </div>
  </div>

  <div class="footer">Данные: AlAdhan API · Метод: Muslim World League</div>
</div>

<script>
  const PRAYERS = [
    { key: 'Fajr',    nameRu: 'Фаджр',   nameAr: 'الفجر',   icon: '🌙' },
    { key: 'Dhuhr',   nameRu: 'Зухр',    nameAr: 'الظهر',   icon: '☀️' },
    { key: 'Asr',     nameRu: 'Аср',     nameAr: 'العصر',   icon: '🌤' },
    { key: 'Maghrib', nameRu: 'Магриб',  nameAr: 'المغرب',  icon: '🌆' },
    { key: 'Isha',    nameRu: 'Иша',     nameAr: 'العشاء',  icon: '🌙' },
  ];

  const HIJRI_MONTHS = [
    'Мухаррам','Сафар','Рабиуль-авваль','Рабиуль-ахир',
    'Джумадаль-уля','Джумадаль-ахира','Раджаб','Шаабан',
    'Рамадан','Шавваль','Зуль-Каада','Зуль-Хиджжа'
  ];

  let timings = null;

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}`;
    if (timings) updateActiveAndCountdown(now);
  }

  function parseTime(str) {
    const [h, m] = str.split(':').map(Number);
    return h * 60 + m;
  }

  function minsToStr(mins) {
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  function updateActiveAndCountdown(now) {
    const nowMins = now.getHours() * 60 + now.getMinutes();
    const cards = document.querySelectorAll('.prayer-card');

    let nextIdx = -1;
    let minDiff = Infinity;

    PRAYERS.forEach((p, i) => {
      const t = parseTime(timings[p.key]);
      const diff = t - nowMins;
      cards[i].classList.remove('active', 'passed');
      if (diff < 0) {
        cards[i].classList.add('passed');
      }
      if (diff > 0 && diff < minDiff) {
        minDiff = diff;
        nextIdx = i;
      }
    });

    if (nextIdx >= 0) {
      cards[nextIdx].classList.remove('passed');
      cards[nextIdx].classList.add('active');
      document.getElementById('next-block').style.display = 'flex';
      document.getElementById('next-name').textContent = PRAYERS[nextIdx].nameRu;
      document.getElementById('next-countdown').textContent = minsToStr(minDiff);
    } else {
      document.getElementById('next-block').style.display = 'none';
    }
  }

  async function fetchPrayerTimes() {
    const today = new Date();
    const d = today.getDate();
    const mo = today.getMonth() + 1;
    const y = today.getFullYear();
    const url = `https://api.aladhan.com/v1/timingsByCity?city=Baku&country=AZ&method=3&date=${d}-${mo}-${y}`;

    try {
      const res = await fetch(url);
      const json = await res.json();
      if (json.code !== 200) throw new Error('API error');

      timings = json.data.timings;
      const date = json.data.date;

      // Gregorian date
      const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
      const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
      const dayName = days[today.getDay()];
      const dateStr = `${dayName}, ${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;
      document.getElementById('date-gregorian').textContent = dateStr;

      // Hijri date
      const hDay = date.hijri.day;
      const hMonthNum = parseInt(date.hijri.month.number) - 1;
      const hYear = date.hijri.year;
      document.getElementById('date-hijri').textContent = `${hDay} ${HIJRI_MONTHS[hMonthNum]} ${hYear} г.х.`;

      // Render prayer cards
      const container = document.getElementById('prayers-container');
      container.innerHTML = '<div class="prayers" id="prayers-list"></div>';
      const list = document.getElementById('prayers-list');

      PRAYERS.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'prayer-card';
        card.style.animationDelay = `${0.15 + i * 0.08}s`;
        card.innerHTML = `
          <div class="prayer-left">
            <div class="prayer-icon">${p.icon}</div>
            <div>
              <div class="prayer-name-ru">${p.nameRu}</div>
              <div class="prayer-name-ar">${p.nameAr}</div>
            </div>
          </div>
          <div class="prayer-time">${timings[p.key]}</div>
        `;
        list.appendChild(card);
      });

      updateActiveAndCountdown(new Date());

    } catch (e) {
      document.getElementById('prayers-container').innerHTML =
        '<div class="error">⚠️ Не удалось загрузить данные.<br>Проверь подключение к интернету.</div>';
    }
  }

  // Init
  fetchPrayerTimes();
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
