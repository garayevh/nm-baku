<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Намаз — Баку</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Scheherazade+New:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:      #0d1017;
–card:    #161b25;
–card2:   #1c2230;
–white:   #ffffff;
–gray1:   #d0d4dc;   /* secondary text */
–gray2:   #8a8f9a;   /* muted labels */
–gray3:   #444a56;   /* very muted / borders */
–gold:    #d4a84a;   /* accent only */
–gold2:   #ecc870;   /* bright accent */
–border:  rgba(255,255,255,0.07);
–border-active: rgba(212,168,74,0.4);
}

body {
background: var(–bg);
color: var(–white);
font-family: ‘Inter’, sans-serif;
font-weight: 400;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 0 0 60px;
overflow-x: hidden;
}

/* subtle top vignette */
body::before {
content: ‘’;
position: fixed; inset: 0; z-index: 0; pointer-events: none;
background:
radial-gradient(ellipse 100% 35% at 50% 0%, rgba(212,168,74,0.06) 0%, transparent 60%),
radial-gradient(ellipse 80% 30% at 50% 100%, rgba(0,0,0,0.4) 0%, transparent 70%);
}

/* geometric tile */
body::after {
content: ‘’;
position: fixed; inset: 0; z-index: 0; pointer-events: none;
opacity: 0.025;
background-image: url(“data:image/svg+xml,%3Csvg width=‘80’ height=‘80’ viewBox=‘0 0 80 80’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=‘none’%3E%3Cpolygon points=‘40,2 78,22 78,58 40,78 2,58 2,22’ stroke=’%23ffffff’ stroke-width=‘0.8’/%3E%3Cpolygon points=‘40,18 62,30 62,50 40,62 18,50 18,30’ stroke=’%23ffffff’ stroke-width=‘0.4’/%3E%3C/g%3E%3C/svg%3E”);
}

.page {
max-width: 440px; width: 100%;
position: relative; z-index: 1;
}

/* ── Header ── */
.header {
padding: 44px 24px 28px;
text-align: center;
animation: riseUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
}

.crescent {
font-size: 1.6rem; display: block; margin-bottom: 10px;
filter: drop-shadow(0 0 8px rgba(212,168,74,0.6));
animation: glow 3s ease-in-out infinite alternate;
}
@keyframes glow {
from { filter: drop-shadow(0 0 4px rgba(212,168,74,0.4)); }
to   { filter: drop-shadow(0 0 18px rgba(212,168,74,0.9)); }
}

.arabic-title {
font-family: ‘Scheherazade New’, serif;
font-size: 2.7rem;
color: var(–white);          /* pure white */
line-height: 1;
margin-bottom: 10px;
}

.city-label {
font-size: 0.68rem;
letter-spacing: 0.42em;
text-transform: uppercase;
color: var(–gray2);
font-weight: 300;
}

/* ── Clock card ── */
.clock-card {
margin: 0 16px 12px;
background: var(–card);
border: 1px solid var(–border);
border-radius: 18px;
padding: 18px 24px;
display: flex; justify-content: space-between; align-items: center;
animation: riseUp 0.9s 0.08s cubic-bezier(0.16,1,0.3,1) both;
}

.date-greg {
font-size: 0.92rem;
color: var(–white);
font-weight: 500;
letter-spacing: -0.01em;
}

.date-hijri {
font-size: 0.74rem;
color: var(–gray2);
font-family: ‘Cormorant Garamond’, serif;
font-style: italic;
margin-top: 3px;
}

.live-clock {
font-family: ‘Cormorant Garamond’, serif;
font-size: 2.2rem;
font-weight: 400;
color: var(–gold2);          /* GOLD — only accent */
letter-spacing: 0.02em;
line-height: 1;
white-space: nowrap;
}
.live-clock .secs {
font-size: 1.1rem;
color: var(–gold);
opacity: 0.8;
}

/* ── Progress ── */
.progress-wrap {
margin: 0 16px 12px;
animation: riseUp 0.9s 0.13s cubic-bezier(0.16,1,0.3,1) both;
}
.progress-label {
display: flex; justify-content: space-between;
font-size: 0.62rem;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–gray2);
margin-bottom: 7px;
font-weight: 400;
}
.progress-track {
height: 3px;
background: rgba(255,255,255,0.06);
border-radius: 999px; overflow: hidden;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold) 0%, var(–gold2) 100%);
border-radius: 999px;
transition: width 1s ease;
box-shadow: 0 0 8px rgba(212,168,74,0.5);
}

/* ── Next prayer ── */
.next-card {
margin: 0 16px 12px;
border-radius: 18px;
padding: 20px 24px;
display: flex; justify-content: space-between; align-items: center;
background: linear-gradient(135deg, rgba(212,168,74,0.14), rgba(212,168,74,0.05));
border: 1px solid rgba(212,168,74,0.3);
position: relative; overflow: hidden;
animation: riseUp 0.9s 0.18s cubic-bezier(0.16,1,0.3,1) both;
}
.next-card::before {
content: ‘’;
position: absolute; top: -40px; right: -40px;
width: 120px; height: 120px; border-radius: 50%;
background: radial-gradient(circle, rgba(212,168,74,0.1) 0%, transparent 70%);
}

.next-tag {
font-size: 0.6rem;
letter-spacing: 0.3em;
text-transform: uppercase;
color: var(–gray2);           /* muted label */
margin-bottom: 6px;
font-weight: 400;
}

.next-prayer-name {
font-size: 1.6rem;
font-weight: 600;
color: var(–white);           /* WHITE — clear */
line-height: 1;
letter-spacing: -0.02em;
}

.countdown {
font-family: ‘Cormorant Garamond’, serif;
font-size: 2.1rem;
font-weight: 400;
color: var(–gold2);           /* GOLD accent */
letter-spacing: 0.02em;
text-align: right;
line-height: 1;
}
.countdown-sub {
font-size: 0.58rem;
color: var(–gray2);
letter-spacing: 0.2em;
text-transform: uppercase;
text-align: right;
margin-top: 4px;
}

/* ── Sun strip ── */
.sun-strip {
margin: 0 16px 12px;
background: var(–card);
border: 1px solid var(–border);
border-radius: 16px;
padding: 15px 20px;
display: flex; justify-content: space-around; align-items: center;
animation: riseUp 0.9s 0.23s cubic-bezier(0.16,1,0.3,1) both;
}
.sun-item { text-align: center; }
.sun-icon  { font-size: 1.3rem; display: block; margin-bottom: 5px; }
.sun-label {
font-size: 0.58rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(–gray2);
margin-bottom: 3px;
}
.sun-time {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.2rem;
color: var(–white);           /* WHITE */
font-weight: 400;
}
.sun-div { width: 1px; height: 40px; background: var(–border); }

/* ── Prayer cards ── */
.prayers-section {
margin: 0 16px;
display: flex; flex-direction: column; gap: 8px;
}

.prayer-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 16px;
padding: 15px 20px;
display: flex; justify-content: space-between; align-items: center;
transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
cursor: default;
position: relative; overflow: hidden;
animation: riseUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
}

.prayer-card::after {
content: ‘’; position: absolute;
left: 0; top: 0; bottom: 0; width: 3px;
background: transparent;
transition: background 0.3s;
}

.prayer-card:hover {
border-color: rgba(255,255,255,0.14);
background: var(–card2);
transform: translateX(5px);
}
.prayer-card:hover::after { background: rgba(255,255,255,0.2); }

.prayer-card.active {
background: linear-gradient(135deg, rgba(212,168,74,0.13), rgba(212,168,74,0.04));
border-color: var(–border-active);
box-shadow: 0 4px 24px rgba(212,168,74,0.08);
}
.prayer-card.active::after { background: var(–gold2); }

.prayer-card.passed { opacity: 0.38; }

.p-left { display: flex; align-items: center; gap: 14px; }

.p-dot {
width: 40px; height: 40px; border-radius: 12px;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.08);
display: flex; align-items: center; justify-content: center;
font-size: 1.1rem; transition: all 0.3s;
}
.prayer-card.active .p-dot {
background: rgba(212,168,74,0.18);
border-color: rgba(212,168,74,0.4);
box-shadow: 0 0 12px rgba(212,168,74,0.2);
}

.p-name-ru {
font-size: 0.95rem;
font-weight: 500;
color: var(–white);           /* WHITE */
letter-spacing: -0.01em;
}
.p-name-ar {
font-family: ‘Scheherazade New’, serif;
font-size: 0.95rem;
color: var(–gray2);           /* muted arabic */
margin-top: 1px;
}

.p-time {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.5rem;
font-weight: 400;
color: var(–gray1);           /* light gray — NOT gold, to save gold for active */
letter-spacing: 0.01em;
}
.prayer-card.active .p-time {
color: var(–gold2);           /* GOLD only when active */
font-weight: 600;
}

/* ── Loading / Error ── */
.loading {
text-align: center; padding: 64px 24px; color: var(–gray2);
}
.spinner {
width: 36px; height: 36px;
border: 1.5px solid rgba(255,255,255,0.08);
border-top-color: var(–white);
border-radius: 50%;
animation: spin 0.9s linear infinite;
margin: 0 auto 16px;
}
.error-msg {
text-align: center; padding: 40px 24px;
color: #e07070; font-size: 0.9rem; line-height: 1.7;
}

/* ── Footer ── */
.footer {
text-align: center; margin-top: 36px; padding: 0 24px;
font-size: 0.6rem; color: var(–gray3);
letter-spacing: 0.16em; text-transform: uppercase;
animation: riseUp 0.9s 0.65s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes riseUp {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>

</head>
<body>
<div class="page">
  <div class="header">
    <span class="crescent">☽</span>
    <div class="arabic-title">أوقات الصلاة</div>
    <div class="city-label">Баку &nbsp;·&nbsp; Азербайджан</div>
  </div>

  <div class="clock-card">
    <div>
      <div class="date-greg" id="date-greg">—</div>
      <div class="date-hijri" id="date-hijri">—</div>
    </div>
    <div class="live-clock">
      <span id="clock-hm">--:--</span><span class="secs" id="clock-s">:--</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Полночь</span>
      <span id="progress-pct">0%</span>
      <span>Полночь</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="next-card" id="next-card" style="display:none">
    <div>
      <div class="next-tag">Следующий намаз</div>
      <div class="next-prayer-name" id="next-name">—</div>
    </div>
    <div>
      <div class="countdown" id="next-countdown">--:--:--</div>
      <div class="countdown-sub">осталось</div>
    </div>
  </div>

  <div class="sun-strip" id="sun-strip" style="display:none">
    <div class="sun-item">
      <span class="sun-icon">🌅</span>
      <div class="sun-label">Восход</div>
      <div class="sun-time" id="sun-rise">—</div>
    </div>
    <div class="sun-div"></div>
    <div class="sun-item">
      <span class="sun-icon">🌇</span>
      <div class="sun-label">Закат</div>
      <div class="sun-time" id="sun-set">—</div>
    </div>
    <div class="sun-div"></div>
    <div class="sun-item">
      <span class="sun-icon">🌑</span>
      <div class="sun-label">Ислам. полночь</div>
      <div class="sun-time" id="sun-mid">—</div>
    </div>
  </div>

  <div id="prayers-container">
    <div class="loading">
      <div class="spinner"></div>
      <div>Загрузка времён намаза...</div>
    </div>
  </div>

  <div class="footer">AlAdhan API · Muslim World League · Баку</div>
</div>

<script>
const PRAYERS = [
  { key:'Fajr',    ru:'Фаджр',  ar:'الفجر',  icon:'🌙' },
  { key:'Dhuhr',   ru:'Зухр',   ar:'الظهر',  icon:'☀️' },
  { key:'Asr',     ru:'Аср',    ar:'العصر',  icon:'🌤️' },
  { key:'Maghrib', ru:'Магриб', ar:'المغرب', icon:'🌆' },
  { key:'Isha',    ru:'Иша',    ar:'العشاء', icon:'✨' },
];

const HIJRI_MONTHS = ['Мухаррам','Сафар','Рабиуль-авваль','Рабиуль-ахир','Джумадаль-уля','Джумадаль-ахира','Раджаб','Шаабан','Рамадан','Шавваль','Зуль-Каада','Зуль-Хиджжа'];
const DAYS   = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

let timings = null;

function strip(s){ return (s||'--:--').split(' ')[0].substring(0,5); }
function parseMins(s){ const [h,m]=strip(s).split(':').map(Number); return h*60+m; }
function hms(s){ return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

function tick(){
  const now=new Date();
  const h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();
  document.getElementById('clock-hm').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  document.getElementById('clock-s').textContent=`:${String(s).padStart(2,'0')}`;
  const pct=((h*3600+m*60+s)/864).toFixed(1);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  if(timings) updateActive(now);
}

function updateActive(now){
  const ns=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  const cards=document.querySelectorAll('.prayer-card');
  let nxt=-1, minD=Infinity;
  PRAYERS.forEach((p,i)=>{
    const ts=parseMins(timings[p.key])*60, d=ts-ns;
    cards[i].classList.remove('active','passed');
    if(d<0) cards[i].classList.add('passed');
    if(d>0&&d<minD){minD=d;nxt=i;}
  });
  const nc=document.getElementById('next-card');
  if(nxt>=0){
    cards[nxt].classList.remove('passed');
    cards[nxt].classList.add('active');
    nc.style.display='flex';
    document.getElementById('next-name').textContent=PRAYERS[nxt].ru;
    document.getElementById('next-countdown').textContent=hms(minD);
  } else {
    nc.style.display='flex';
    document.getElementById('next-name').textContent='Фаджр (завтра)';
    document.getElementById('next-countdown').textContent=hms((86400-ns)+parseMins(timings['Fajr'])*60);
    PRAYERS.forEach((_,i)=>cards[i].classList.add('passed'));
  }
}

async function load(){
  const t=new Date();
  try{
    const r=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Baku&country=AZ&method=3&date=${t.getDate()}-${t.getMonth()+1}-${t.getFullYear()}`);
    const j=await r.json();
    if(j.code!==200) throw 0;
    timings=j.data.timings;
    const d=j.data.date;
    document.getElementById('date-greg').textContent=`${DAYS[t.getDay()]}, ${t.getDate()} ${MONTHS[t.getMonth()]} ${t.getFullYear()}`;
    document.getElementById('date-hijri').textContent=`${d.hijri.day} ${HIJRI_MONTHS[+d.hijri.month.number-1]} ${d.hijri.year} г.х.`;
    document.getElementById('sun-rise').textContent=strip(timings['Sunrise']);
    document.getElementById('sun-set').textContent=strip(timings['Sunset']);
    document.getElementById('sun-mid').textContent=strip(timings['Midnight']);
    document.getElementById('sun-strip').style.display='flex';
    const cont=document.getElementById('prayers-container');
    cont.innerHTML='<div class="prayers-section" id="pl"></div>';
    const list=document.getElementById('pl');
    PRAYERS.forEach((p,i)=>{
      const c=document.createElement('div');
      c.className='prayer-card';
      c.style.animationDelay=`${0.28+i*0.08}s`;
      c.innerHTML=`<div class="p-left"><div class="p-dot">${p.icon}</div><div><div class="p-name-ru">${p.ru}</div><div class="p-name-ar">${p.ar}</div></div></div><div class="p-time">${strip(timings[p.key])}</div>`;
      list.appendChild(c);
    });
    document.getElementById('next-card').style.display='flex';
    updateActive(new Date());
  } catch{
    document.getElementById('prayers-container').innerHTML='<div class="error-msg">⚠️ Не удалось загрузить данные.<br>Проверь подключение к интернету.</div>';
  }
}

load(); tick(); setInterval(tick,1000);
</script>

</body>
</html>
