<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Намаз — Баку</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Scheherazade+New:wght@400;700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–ink:    #0a0c10;
–ink2:   #111520;
–ink3:   #171d2a;
–gold:   #c8a84b;
–gold2:  #e2c97e;
–gold3:  #f0dfa0;
–copper: #b07d3a;
–text:   #e8dfc8;
–muted:  #6e6455;
–dim:    #3a3328;
}

body {
background: var(–ink);
color: var(–text);
font-family: ‘Jost’, sans-serif;
font-weight: 300;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 0 0 60px;
position: relative;
overflow-x: hidden;
}

.sky-bg {
position: fixed; inset: 0; z-index: 0; pointer-events: none;
transition: background 4s ease;
}
.sky-bg::before {
content: ‘’;
position: absolute; inset: 0;
background:
radial-gradient(ellipse 120% 60% at 50% 0%, rgba(200,168,75,0.08) 0%, transparent 55%),
radial-gradient(ellipse 60% 40% at 80% 100%, rgba(42,122,111,0.04) 0%, transparent 50%);
}
.sky-bg::after {
content: ‘’;
position: absolute; inset: 0;
opacity: 0.025;
background-image: url(“data:image/svg+xml,%3Csvg width=‘80’ height=‘80’ viewBox=‘0 0 80 80’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=‘none’%3E%3Cpolygon points=‘40,2 78,22 78,58 40,78 2,58 2,22’ stroke=’%23c8a84b’ stroke-width=‘1’/%3E%3Cpolygon points=‘40,18 62,30 62,50 40,62 18,50 18,30’ stroke=’%23c8a84b’ stroke-width=‘0.5’/%3E%3C/g%3E%3C/svg%3E”);
}

.page {
max-width: 440px; width: 100%;
position: relative; z-index: 1;
}

/* Header */
.header {
padding: 48px 24px 32px;
text-align: center;
animation: riseUp 1s cubic-bezier(0.16,1,0.3,1) both;
}

.crescent {
font-size: 2rem; display: block; margin-bottom: 12px;
animation: glow 3s ease-in-out infinite alternate;
}
@keyframes glow {
from { filter: drop-shadow(0 0 8px rgba(200,168,75,0.3)); }
to   { filter: drop-shadow(0 0 28px rgba(200,168,75,0.8)); }
}

.arabic-title {
font-family: ‘Scheherazade New’, serif;
font-size: 2.8rem; color: var(–gold2);
line-height: 1; margin-bottom: 8px;
}
.city-label {
font-size: 0.68rem; letter-spacing: 0.45em;
text-transform: uppercase; color: var(–muted); font-weight: 200;
}

/* Clock card */
.clock-card {
margin: 0 16px 16px;
background: var(–ink2);
border: 1px solid rgba(200,168,75,0.12);
border-radius: 20px; padding: 20px 28px;
display: flex; justify-content: space-between; align-items: center;
animation: riseUp 1s 0.1s cubic-bezier(0.16,1,0.3,1) both;
}
.date-greg  { font-size: 0.88rem; color: var(–text); font-weight: 400; }
.date-hijri {
font-size: 0.72rem; color: var(–muted);
font-family: ‘Cormorant Garamond’, serif; font-style: italic; margin-top: 2px;
}
.live-clock {
font-family: ‘Cormorant Garamond’, serif;
font-size: 2rem; font-weight: 300; color: var(–gold2);
letter-spacing: 0.04em; line-height: 1; white-space: nowrap;
}
.live-clock .secs { font-size: 1.1rem; color: var(–copper); }

/* Progress */
.progress-wrap {
margin: 0 16px 16px;
animation: riseUp 1s 0.18s cubic-bezier(0.16,1,0.3,1) both;
}
.progress-label {
display: flex; justify-content: space-between;
font-size: 0.6rem; letter-spacing: 0.2em;
text-transform: uppercase; color: var(–muted); margin-bottom: 7px;
}
.progress-track {
height: 2px; background: rgba(200,168,75,0.08);
border-radius: 999px; overflow: hidden;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–copper), var(–gold2));
border-radius: 999px; transition: width 1s ease;
box-shadow: 0 0 8px rgba(200,168,75,0.5);
}

/* Next */
.next-card {
margin: 0 16px 16px;
border-radius: 20px; padding: 20px 24px;
display: flex; justify-content: space-between; align-items: center;
background: linear-gradient(135deg, rgba(200,168,75,0.14), rgba(200,168,75,0.04));
border: 1px solid rgba(200,168,75,0.3);
position: relative; overflow: hidden;
animation: riseUp 1s 0.22s cubic-bezier(0.16,1,0.3,1) both;
}
.next-card::before {
content: ‘’;
position: absolute; top: -50px; right: -50px;
width: 130px; height: 130px; border-radius: 50%;
background: radial-gradient(circle, rgba(200,168,75,0.1) 0%, transparent 70%);
}
.next-tag {
font-size: 0.6rem; letter-spacing: 0.35em;
text-transform: uppercase; color: var(–gold); margin-bottom: 5px;
}
.next-prayer-name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.5rem; font-weight: 600; color: var(–text); line-height: 1;
}
.countdown {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.9rem; font-weight: 300; color: var(–gold3);
letter-spacing: 0.03em; text-align: right;
}
.countdown-sub {
font-size: 0.58rem; color: var(–muted); letter-spacing: 0.2em;
text-transform: uppercase; text-align: right; margin-top: 3px;
}

/* Sun strip */
.sun-strip {
margin: 0 16px 16px;
background: var(–ink2);
border: 1px solid rgba(200,168,75,0.08);
border-radius: 16px; padding: 14px 20px;
display: flex; justify-content: space-around; align-items: center;
animation: riseUp 1s 0.28s cubic-bezier(0.16,1,0.3,1) both;
}
.sun-item { text-align: center; }
.sun-icon  { font-size: 1.2rem; display: block; margin-bottom: 4px; }
.sun-label {
font-size: 0.58rem; letter-spacing: 0.22em;
text-transform: uppercase; color: var(–muted); margin-bottom: 2px;
}
.sun-time  { font-family: ‘Cormorant Garamond’, serif; font-size: 1.1rem; color: var(–gold); }
.sun-div   { width: 1px; height: 38px; background: rgba(200,168,75,0.1); }

/* Prayer cards */
.prayers-section {
margin: 0 16px;
display: flex; flex-direction: column; gap: 8px;
}

.prayer-card {
background: var(–ink2);
border: 1px solid rgba(255,255,255,0.04);
border-radius: 16px; padding: 14px 20px;
display: flex; justify-content: space-between; align-items: center;
transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
cursor: default; position: relative; overflow: hidden;
animation: riseUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
.prayer-card::after {
content: ‘’; position: absolute;
left: 0; top: 0; bottom: 0; width: 3px;
background: transparent;
transition: background 0.3s ease;
}
.prayer-card:hover {
border-color: rgba(200,168,75,0.2);
background: var(–ink3); transform: translateX(6px);
}
.prayer-card:hover::after { background: rgba(200,168,75,0.4); }

.prayer-card.active {
background: linear-gradient(135deg, rgba(200,168,75,0.13), rgba(200,168,75,0.04));
border-color: rgba(200,168,75,0.4);
box-shadow: 0 4px 32px rgba(200,168,75,0.08), inset 0 1px 0 rgba(200,168,75,0.15);
}
.prayer-card.active::after { background: var(–gold); }
.prayer-card.passed { opacity: 0.38; }

.p-left { display: flex; align-items: center; gap: 16px; }

.p-dot {
width: 38px; height: 38px; border-radius: 12px;
background: rgba(200,168,75,0.07);
border: 1px solid rgba(200,168,75,0.12);
display: flex; align-items: center; justify-content: center;
font-size: 1rem; transition: all 0.3s ease;
}
.prayer-card.active .p-dot {
background: rgba(200,168,75,0.2);
border-color: rgba(200,168,75,0.4);
box-shadow: 0 0 14px rgba(200,168,75,0.2);
}

.p-name-ru { font-size: 0.92rem; font-weight: 400; color: var(–text); }
.p-name-ar {
font-family: ‘Scheherazade New’, serif;
font-size: 0.95rem; color: var(–muted); margin-top: 1px;
}

.p-time {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.45rem; font-weight: 300;
color: var(–gold); letter-spacing: 0.02em;
}
.prayer-card.active .p-time { color: var(–gold3); font-weight: 400; }

/* Loading / Error */
.loading {
text-align: center; padding: 64px 24px; color: var(–muted);
}
.spinner {
width: 36px; height: 36px;
border: 1.5px solid rgba(200,168,75,0.15);
border-top-color: var(–gold); border-radius: 50%;
animation: spin 0.9s linear infinite;
margin: 0 auto 16px;
}
.error-msg {
text-align: center; padding: 40px 24px; color: #c06060; font-size: 0.85rem; line-height: 1.7;
}

/* Footer */
.footer {
text-align: center; margin-top: 40px; padding: 0 24px;
font-size: 0.6rem; color: var(–dim);
letter-spacing: 0.18em; text-transform: uppercase;
animation: riseUp 1s 0.7s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes riseUp {
from { opacity: 0; transform: translateY(24px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>

</head>
<body>

<div class="sky-bg" id="sky-bg"></div>

<div class="page">
  <div class="header">
    <span class="crescent">☽</span>
    <div class="arabic-title">أوقات الصلاة</div>
    <div class="city-label">Баку &nbsp;·&nbsp; Азербайджан</div>
  </div>

  <div class="clock-card">
    <div>
      <div class="date-greg" id="date-greg">—</div>
      <div class="date-hijri" id="date-hijri">—</div>
    </div>
    <div class="live-clock">
      <span id="clock-hm">--:--</span><span class="secs" id="clock-s">:--</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Полночь</span>
      <span id="progress-pct">0%</span>
      <span>Полночь</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="next-card" id="next-card" style="display:none">
    <div>
      <div class="next-tag">Следующий намаз</div>
      <div class="next-prayer-name" id="next-name">—</div>
    </div>
    <div>
      <div class="countdown" id="next-countdown">--:--:--</div>
      <div class="countdown-sub">осталось</div>
    </div>
  </div>

  <div class="sun-strip" id="sun-strip" style="display:none">
    <div class="sun-item">
      <span class="sun-icon">🌅</span>
      <div class="sun-label">Восход</div>
      <div class="sun-time" id="sun-rise">—</div>
    </div>
    <div class="sun-div"></div>
    <div class="sun-item">
      <span class="sun-icon">🌇</span>
      <div class="sun-label">Закат</div>
      <div class="sun-time" id="sun-set">—</div>
    </div>
    <div class="sun-div"></div>
    <div class="sun-item">
      <span class="sun-icon">🌑</span>
      <div class="sun-label">Ислам. полночь</div>
      <div class="sun-time" id="sun-mid">—</div>
    </div>
  </div>

  <div id="prayers-container">
    <div class="loading">
      <div class="spinner"></div>
      <div>Загрузка времён намаза...</div>
    </div>
  </div>

  <div class="footer">AlAdhan API &nbsp;·&nbsp; Muslim World League &nbsp;·&nbsp; Баку</div>
</div>

<script>
const PRAYERS = [
  { key:'Fajr',    ru:'Фаджр',  ar:'الفجر',  icon:'🌙' },
  { key:'Dhuhr',   ru:'Зухр',   ar:'الظهر',  icon:'☀️' },
  { key:'Asr',     ru:'Аср',    ar:'العصر',  icon:'🌤️' },
  { key:'Maghrib', ru:'Магриб', ar:'المغرب', icon:'🌆' },
  { key:'Isha',    ru:'Иша',    ar:'العشاء', icon:'✨' },
];

const HIJRI_MONTHS = ['Мухаррам','Сафар','Рабиуль-авваль','Рабиуль-ахир','Джумадаль-уля','Джумадаль-ахира','Раджаб','Шаабан','Рамадан','Шавваль','Зуль-Каада','Зуль-Хиджжа'];
const DAYS   = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

const SKY = [
  [0,'#050710'],[4,'#0a0e1a'],[5,'#1a1530'],[6,'#2a1a35'],
  [7,'#1e3050'],[9,'#0f1e35'],[12,'#0d1a2e'],[15,'#0f1e35'],
  [17,'#2a1520'],[18,'#3a1820'],[20,'#1a1230'],[22,'#0a0c1a'],[24,'#050710']
];

let timings = null;

function lerp(a,b,t){ return a+(b-a)*t; }
function hexRGB(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }

function skyColor(h,m){
  const t=h+m/60;
  let i=SKY.length-2;
  for(let j=0;j<SKY.length-1;j++) if(t>=SKY[j][0]&&t<SKY[j+1][0]){i=j;break;}
  const f=(t-SKY[i][0])/(SKY[i+1][0]-SKY[i][0]+1e-6);
  const [r0,g0,b0]=hexRGB(SKY[i][1]), [r1,g1,b1]=hexRGB(SKY[i+1][1]);
  return `#${Math.round(lerp(r0,r1,f)).toString(16).padStart(2,'0')}${Math.round(lerp(g0,g1,f)).toString(16).padStart(2,'0')}${Math.round(lerp(b0,b1,f)).toString(16).padStart(2,'0')}`;
}

function strip(s){ return (s||'--:--').split(' ')[0].substring(0,5); }
function parseMins(s){ const [h,m]=strip(s).split(':').map(Number); return h*60+m; }
function hms(s){ return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

function tick(){
  const now=new Date();
  const h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();
  document.getElementById('clock-hm').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  document.getElementById('clock-s').textContent=`:${String(s).padStart(2,'0')}`;
  document.getElementById('sky-bg').style.background=skyColor(h,m);
  const pct=((h*3600+m*60+s)/864).toFixed(1);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  if(timings) updateActive(now);
}

function updateActive(now){
  const ns=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  const cards=document.querySelectorAll('.prayer-card');
  let nxt=-1, minD=Infinity;

  PRAYERS.forEach((p,i)=>{
    const ts=parseMins(timings[p.key])*60;
    const d=ts-ns;
    cards[i].classList.remove('active','passed');
    if(d<0) cards[i].classList.add('passed');
    if(d>0&&d<minD){minD=d;nxt=i;}
  });

  const nc=document.getElementById('next-card');
  if(nxt>=0){
    cards[nxt].classList.remove('passed');
    cards[nxt].classList.add('active');
    nc.style.display='flex';
    document.getElementById('next-name').textContent=PRAYERS[nxt].ru;
    document.getElementById('next-countdown').textContent=hms(minD);
  } else {
    const fajrS=parseMins(timings['Fajr'])*60;
    nc.style.display='flex';
    document.getElementById('next-name').textContent='Фаджр (завтра)';
    document.getElementById('next-countdown').textContent=hms((86400-ns)+fajrS);
    PRAYERS.forEach((_,i)=>cards[i].classList.add('passed'));
  }
}

async function load(){
  const t=new Date();
  try{
    const r=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Baku&country=AZ&method=3&date=${t.getDate()}-${t.getMonth()+1}-${t.getFullYear()}`);
    const j=await r.json();
    if(j.code!==200) throw 0;
    timings=j.data.timings;
    const d=j.data.date;

    document.getElementById('date-greg').textContent=`${DAYS[t.getDay()]}, ${t.getDate()} ${MONTHS[t.getMonth()]} ${t.getFullYear()}`;
    document.getElementById('date-hijri').textContent=`${d.hijri.day} ${HIJRI_MONTHS[+d.hijri.month.number-1]} ${d.hijri.year} г.х.`;

    document.getElementById('sun-rise').textContent=strip(timings['Sunrise']);
    document.getElementById('sun-set').textContent=strip(timings['Sunset']);
    document.getElementById('sun-mid').textContent=strip(timings['Midnight']);
    document.getElementById('sun-strip').style.display='flex';

    const cont=document.getElementById('prayers-container');
    cont.innerHTML='<div class="prayers-section" id="pl"></div>';
    const list=document.getElementById('pl');

    PRAYERS.forEach((p,i)=>{
      const c=document.createElement('div');
      c.className='prayer-card';
      c.style.animationDelay=`${0.3+i*0.08}s`;
      c.innerHTML=`<div class="p-left"><div class="p-dot">${p.icon}</div><div><div class="p-name-ru">${p.ru}</div><div class="p-name-ar">${p.ar}</div></div></div><div class="p-time">${strip(timings[p.key])}</div>`;
      list.appendChild(c);
    });

    document.getElementById('next-card').style.display='flex';
    updateActive(new Date());
  } catch{
    document.getElementById('prayers-container').innerHTML='<div class="error-msg">⚠️ Не удалось загрузить данные.<br>Проверь подключение к интернету.</div>';
  }
}

load(); tick(); setInterval(tick,1000);
</script>

</body>
</html>
