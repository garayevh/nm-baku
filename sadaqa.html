<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Садака</title>
<link rel="stylesheet" href="css/base.css"/>
<style>
.page-header { text-align:center; padding:24px 24px 16px; animation:riseUp 0.8s cubic-bezier(0.16,1,0.3,1) both; }
.page-title { font-family:'Scheherazade New',serif; font-size:2rem; color:var(--text); margin-bottom:4px; }
.page-sub { font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--muted); }

/* Summary */
.summary-row { display:flex; gap:8px; margin:0 16px 12px; }
.summary-card {
  flex:1; background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:16px; text-align:center;
  animation:riseUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
}
.summary-card.highlight {
  background:linear-gradient(135deg,rgba(212,168,74,0.12),rgba(212,168,74,0.04));
  border-color:var(--border-gold);
}
.s-num {
  font-family:'Cormorant Garamond',serif;
  font-size:1.8rem; font-weight:400; color:var(--gold2); line-height:1;
}
.s-lbl { font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-top:4px; }

/* Zakat calculator */
.calc-card { margin:0 16px 12px; }
.calc-title { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
.input-row { display:flex; flex-direction:column; gap:10px; }
.input-group label { font-size:0.8rem; color:var(--text2); display:block; margin-bottom:4px; }
.input-group input {
  width:100%; padding:10px 14px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; color:var(--text);
  font-family:'Inter',sans-serif; font-size:1rem;
  outline:none; transition:border-color 0.2s;
}
.input-group input:focus { border-color:var(--border-gold); }

.zakat-result {
  margin-top:16px; padding:14px;
  background:rgba(212,168,74,0.08); border:1px solid var(--border-gold);
  border-radius:12px; text-align:center; display:none;
}
.zakat-amount { font-family:'Cormorant Garamond',serif; font-size:2rem; color:var(--gold2); }
.zakat-sub    { font-size:0.72rem; color:var(--muted); margin-top:4px; }

/* Add donation */
.add-card { margin:0 16px 12px; }
.add-title { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }

.category-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.cat-btn {
  background:var(--card2); border:1.5px solid var(--border);
  border-radius:12px; padding:10px 8px; text-align:center;
  cursor:pointer; transition:all 0.2s; font-size:0.82rem; color:var(--text2);
}
.cat-btn:hover { border-color:var(--border-gold); }
.cat-btn.sel   { border-color:var(--gold2); background:rgba(212,168,74,0.1); color:var(--text); font-weight:500; }
.cat-icon { font-size:1.2rem; display:block; margin-bottom:4px; }

.amount-row { display:flex; gap:8px; align-items:center; }
.amount-row input {
  flex:1; padding:11px 14px;
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  color:var(--text); font-size:1rem; font-family:'Inter',sans-serif; outline:none;
  transition:border-color 0.2s;
}
.amount-row input:focus { border-color:var(--border-gold); }
.currency { color:var(--muted); font-size:0.85rem; white-space:nowrap; }

/* Log */
.log-wrap { margin:0 16px; }
.log-title { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.log-item {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:12px 16px; margin-bottom:8px;
  display:flex; justify-content:space-between; align-items:center;
}
.log-cat   { font-size:0.88rem; color:var(--text); font-weight:500; }
.log-date  { font-size:0.72rem; color:var(--muted); margin-top:2px; }
.log-amt   { font-family:'Cormorant Garamond',serif; font-size:1.3rem; color:var(--gold2); }
.log-del   { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:4px; margin-left:8px; }
.log-del:hover { color:#e07070; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="page-title">💛 Садака</div>
    <div class="page-sub">Трекер пожертвований</div>
  </div>

  <!-- Summary -->
  <div class="summary-row">
    <div class="summary-card anim">
      <div class="s-num" id="total-today">0 ₼</div>
      <div class="s-lbl">Сегодня</div>
    </div>
    <div class="summary-card highlight anim anim-1">
      <div class="s-num" id="total-month">0 ₼</div>
      <div class="s-lbl">Этот месяц</div>
    </div>
    <div class="summary-card anim anim-2">
      <div class="s-num" id="total-all">0 ₼</div>
      <div class="s-lbl">Всего</div>
    </div>
  </div>

  <!-- Zakat Calculator -->
  <div class="card calc-card anim anim-2">
    <div class="calc-title">⚖️ Калькулятор закята</div>
    <div class="input-row">
      <div class="input-group">
        <label>Ваши накопления (₼)</label>
        <input type="number" id="wealth" placeholder="0" oninput="calcZakat()"/>
      </div>
      <div class="input-group">
        <label>Нисаб (цена 85г золота, ≈ текущий курс)</label>
        <input type="number" id="nisab" placeholder="5000" value="5000" oninput="calcZakat()"/>
      </div>
    </div>
    <div class="zakat-result" id="zakat-result">
      <div class="zakat-amount" id="zakat-amount">0 ₼</div>
      <div class="zakat-sub">2.5% от ваших накоплений (фард)</div>
    </div>
  </div>

  <!-- Add Donation -->
  <div class="card add-card anim anim-3">
    <div class="add-title">➕ Добавить пожертвование</div>
    <div class="category-grid" id="cat-grid"></div>
    <div class="amount-row">
      <input type="number" id="amount-in" placeholder="Сумма" step="0.01"/>
      <span class="currency">₼ AZN</span>
      <button class="btn btn-gold" onclick="addDonation()">Добавить</button>
    </div>
  </div>

  <!-- Log -->
  <div class="log-wrap anim anim-4">
    <div class="log-title">История пожертвований</div>
    <div id="log-list"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
Theme.init();
renderNavbar();

const CATS = [
  { icon:'🕌', name:'Мечеть' },
  { icon:'🍞', name:'Еда бедным' },
  { icon:'📚', name:'Образование' },
  { icon:'💊', name:'Медицина' },
  { icon:'👨‍👩‍👧', name:'Семья' },
  { icon:'🌍', name:'Другое' },
];

let selCat = 0;
let donations = Store.get('sadaqa_log', []);

function renderCats() {
  document.getElementById('cat-grid').innerHTML = CATS.map((c,i) => `
    <div class="cat-btn ${i===selCat?'sel':''}" onclick="selectCat(${i})">
      <span class="cat-icon">${c.icon}</span>${c.name}
    </div>
  `).join('');
}

function selectCat(i) { selCat=i; renderCats(); }

function calcZakat() {
  const w = parseFloat(document.getElementById('wealth').value)||0;
  const n = parseFloat(document.getElementById('nisab').value)||5000;
  const res = document.getElementById('zakat-result');
  if (w >= n) {
    res.style.display='block';
    document.getElementById('zakat-amount').textContent = (w*0.025).toFixed(2)+' ₼';
  } else {
    res.style.display='none';
  }
}

function addDonation() {
  const amt = parseFloat(document.getElementById('amount-in').value);
  if (!amt || amt<=0) return;
  donations.push({
    cat: CATS[selCat].name,
    icon: CATS[selCat].icon,
    amount: amt,
    date: new Date().toISOString()
  });
  Store.set('sadaqa_log', donations);
  document.getElementById('amount-in').value='';
  renderStats(); renderLog();
}

function deleteDonation(i) {
  donations.splice(i,1);
  Store.set('sadaqa_log', donations);
  renderStats(); renderLog();
}

function renderStats() {
  const now = new Date();
  const todayStr = now.toDateString();
  const monthStr = `${now.getMonth()}-${now.getFullYear()}`;
  let today=0, month=0, all=0;
  donations.forEach(d => {
    const dd = new Date(d.date);
    all += d.amount;
    if (dd.toDateString()===todayStr) today+=d.amount;
    if (`${dd.getMonth()}-${dd.getFullYear()}`===monthStr) month+=d.amount;
  });
  document.getElementById('total-today').textContent = today.toFixed(2)+' ₼';
  document.getElementById('total-month').textContent = month.toFixed(2)+' ₼';
  document.getElementById('total-all').textContent   = all.toFixed(2)+' ₼';
}

function renderLog() {
  const list = document.getElementById('log-list');
  if (!donations.length) {
    list.innerHTML='<div style="text-align:center;color:var(--muted);font-size:0.85rem;padding:20px">Пожертвований пока нет 💛</div>';
    return;
  }
  list.innerHTML = donations.slice().reverse().map((d,ri) => {
    const i = donations.length-1-ri;
    const dt = new Date(d.date);
    return `<div class="log-item">
      <div>
        <div class="log-cat">${d.icon} ${d.cat}</div>
        <div class="log-date">${dt.toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <div style="display:flex;align-items:center">
        <div class="log-amt">${d.amount.toFixed(2)} ₼</div>
        <button class="log-del" onclick="deleteDonation(${i})" title="Удалить">✕</button>
      </div>
    </div>`;
  }).join('');
}

renderCats(); renderStats(); renderLog();
</script>
</body>
</html>
