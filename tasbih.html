<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Тасбих</title>
<link rel="stylesheet" href="css/base.css"/>
<style>
.page-header {
  text-align: center;
  padding: 24px 24px 16px;
  animation: riseUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
}
.page-title {
  font-family: 'Scheherazade New', serif;
  font-size: 2rem; color: var(--text); margin-bottom: 4px;
}
.page-sub { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }

/* ── Dhikr selector ── */
.dhikr-selector {
  margin: 0 16px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.dhikr-option {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 14px 18px;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; transition: all 0.25s ease;
}
.dhikr-option:hover { border-color: var(--border-gold); background: var(--card2); }
.dhikr-option.selected { border-color: var(--gold2); background: rgba(212,168,74,0.08); }

.dhikr-arabic { font-family: 'Scheherazade New', serif; font-size: 1.4rem; color: var(--text); }
.dhikr-ru     { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
.dhikr-target { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--muted); }

/* ── Counter ── */
.counter-wrap {
  margin: 0 16px 16px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 32px 24px;
  text-align: center; position: relative; overflow: hidden;
  animation: riseUp 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) both;
}

.counter-wrap::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(212,168,74,0.06) 0%, transparent 70%);
}

/* ring progress */
.ring-wrap {
  position: relative; width: 200px; height: 200px;
  margin: 0 auto 24px;
}
.ring-svg { transform: rotate(-90deg); }
.ring-bg   { fill: none; stroke: var(--border); stroke-width: 8; }
.ring-fill { fill: none; stroke: var(--gold2); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }

.count-display {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.count-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 4rem; font-weight: 300; color: var(--text); line-height: 1;
}
.count-of {
  font-size: 0.7rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px;
}

.count-label {
  font-family: 'Scheherazade New', serif;
  font-size: 1.6rem; color: var(--gold2); margin-bottom: 6px;
}
.count-label-ru { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; }

/* sessions */
.sessions-info {
  display: flex; justify-content: center; gap: 24px; margin-bottom: 24px;
}
.sess-item { text-align: center; }
.sess-num  { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--text2); }
.sess-lbl  { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }

/* tap button */
.tap-btn {
  width: 120px; height: 120px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-size: 2rem;
  box-shadow: 0 8px 32px rgba(212,168,74,0.3);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  -webkit-tap-highlight-color: transparent;
}
.tap-btn:active { transform: scale(0.93); box-shadow: 0 4px 16px rgba(212,168,74,0.2); }

.action-row { display: flex; justify-content: center; gap: 10px; }

/* completed toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--gold2); color: #1a1000;
  padding: 12px 24px; border-radius: 999px;
  font-weight: 600; font-size: 0.88rem;
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  z-index: 200; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* history */
.history-wrap { margin: 0 16px; }
.history-title { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding: 0 4px; }
.history-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.hist-dhikr { font-size: 0.88rem; color: var(--text); font-weight: 500; }
.hist-count { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold2); }
.hist-time  { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="page-title">📿 Тасбих</div>
    <div class="page-sub">Счётчик зикра</div>
  </div>

  <!-- Dhikr selector -->
  <div class="dhikr-selector anim" id="dhikr-selector"></div>

  <!-- Counter -->
  <div class="counter-wrap anim anim-2">
    <div class="count-label" id="cur-arabic">سُبْحَانَ اللَّهِ</div>
    <div class="count-label-ru" id="cur-ru">Субханаллах</div>

    <div class="ring-wrap">
      <svg class="ring-svg" width="200" height="200" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-fill" id="ring" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="553"/>
      </svg>
      <div class="count-display">
        <div class="count-num" id="count-num">0</div>
        <div class="count-of" id="count-of">из 33</div>
      </div>
    </div>

    <div class="sessions-info">
      <div class="sess-item">
        <div class="sess-num" id="sess-count">0</div>
        <div class="sess-lbl">Серий</div>
      </div>
      <div class="sess-item">
        <div class="sess-num" id="total-count">0</div>
        <div class="sess-lbl">Всего сегодня</div>
      </div>
    </div>

    <button class="tap-btn" id="tap-btn" onclick="tap()">📿</button>

    <div class="action-row">
      <button class="btn btn-ghost" onclick="resetCurrent()">↺ Сброс</button>
      <button class="btn btn-ghost" onclick="skipDhikr()">Следующий →</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-wrap anim anim-4">
    <div class="history-title">История сегодня</div>
    <div id="history-list"></div>
  </div>
</div>

<div class="toast" id="toast">✓ Альхамдулилла!</div>

<script src="js/app.js"></script>
<script>
Theme.init();
renderNavbar();

const DHIKRS = [
  { arabic:'سُبْحَانَ اللَّهِ', ru:'Субханаллах',   target:33, icon:'☀️' },
  { arabic:'الْحَمْدُ لِلَّهِ', ru:'Альхамдулилла', target:33, icon:'🌿' },
  { arabic:'اللَّهُ أَكْبَرُ',  ru:'Аллаху Акбар',  target:34, icon:'🕌' },
  { arabic:'لَا إِلَٰهَ إِلَّا اللَّه', ru:'Ля иляха илля Ллах', target:100, icon:'✨' },
  { arabic:'أَسْتَغْفِرُ اللَّه', ru:'Астагфируллах', target:100, icon:'💧' },
  { arabic:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّد', ru:'Салавут',    target:10, icon:'🌹' },
];

let state = Store.get('tasbih', {
  dhikrIdx: 0,
  count: 0,
  sessions: 0,
  total: 0,
  history: []
});

function save() { Store.set('tasbih', state); }

function renderSelector() {
  const el = document.getElementById('dhikr-selector');
  el.innerHTML = DHIKRS.map((d,i) => `
    <div class="dhikr-option ${i===state.dhikrIdx?'selected':''}" onclick="selectDhikr(${i})">
      <div>
        <div class="dhikr-arabic">${d.arabic}</div>
        <div class="dhikr-ru">${d.ru}</div>
      </div>
      <div class="dhikr-target">${d.icon} ×${d.target}</div>
    </div>
  `).join('');
}

function renderCounter() {
  const d = DHIKRS[state.dhikrIdx];
  document.getElementById('cur-arabic').textContent = d.arabic;
  document.getElementById('cur-ru').textContent = d.ru;
  document.getElementById('count-num').textContent = state.count;
  document.getElementById('count-of').textContent = `из ${d.target}`;
  document.getElementById('sess-count').textContent = state.sessions;
  document.getElementById('total-count').textContent = state.total;

  // ring
  const circ = 2 * Math.PI * 88;
  const pct = Math.min(state.count / d.target, 1);
  document.getElementById('ring').style.strokeDashoffset = circ * (1 - pct);
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const h = state.history.slice(-10).reverse();
  list.innerHTML = h.length === 0
    ? `<div style="text-align:center;color:var(--muted);font-size:0.85rem;padding:20px">Начни считать 📿</div>`
    : h.map(e => `
      <div class="history-item">
        <div>
          <div class="hist-dhikr">${e.ru}</div>
          <div class="hist-time">${e.time}</div>
        </div>
        <div class="hist-count">${e.count}×</div>
      </div>
    `).join('');
}

function selectDhikr(i) {
  state.dhikrIdx = i;
  state.count = 0;
  save(); renderSelector(); renderCounter();
}

function tap() {
  state.count++;
  state.total++;
  const d = DHIKRS[state.dhikrIdx];

  if (state.count >= d.target) {
    // completed one round
    state.sessions++;
    state.history.push({
      ru: d.ru,
      count: d.target,
      time: new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'})
    });
    showToast(d.icon + ' ' + d.ru + ' × ' + d.target + ' ✓');
    // auto-advance to next if subhanallah → alhamdulillah → allahu akbar
    if (state.dhikrIdx < 2) {
      state.dhikrIdx++;
      state.count = 0;
    } else {
      state.count = 0;
    }
    renderSelector();
  }

  save(); renderCounter(); renderHistory();
}

function resetCurrent() {
  state.count = 0; save(); renderCounter();
}

function skipDhikr() {
  state.dhikrIdx = (state.dhikrIdx + 1) % DHIKRS.length;
  state.count = 0; save(); renderSelector(); renderCounter();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Reset history at midnight
const todayKey = new Date().toDateString();
if (Store.get('tasbih_day') !== todayKey) {
  state.total = 0; state.history = []; state.sessions = 0;
  Store.set('tasbih_day', todayKey); save();
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); tap(); }
  if (e.code === 'KeyR') resetCurrent();
});

renderSelector(); renderCounter(); renderHistory();
</script>
</body>
</html>
